services:
  web:
    build: .
    container_name: nuclear_web
    ports:
      - "${APP_PORT:-8083}:80"
    volumes:
      - .:/var/www/html
      # Am comentat linia de mai jos pentru ca acum setam DocumentRoot direct din Dockerfile, 
      # deci nu mai ai neaparata nevoie de un fisier apache.conf extern. 
      # Daca vrei sa il pastrezi, scoate # din fata.
      # - ./apache.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: nuclear_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  pgdata: