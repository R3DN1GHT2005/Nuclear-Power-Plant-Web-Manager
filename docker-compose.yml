services:
  web:
    build: .
    container_name: nuclear_web
    ports:
      - "${APP_PORT_WEB:-8082}:80"
    volumes:
      - .:/var/www/html
    # Aici îi spunem să ia TOATE variabilele din fișierul .env creat de noi
    env_file:
      - .env
    restart: unless-stopped
    
  frontend:
    image: nginx:stable-alpine
    container_name: nuclear_frontend
    ports:
      - "${APP_PORT_FRONTEND:-4000}:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
    restart: unless-stopped

  composer:
    image: composer:lts
    container_name: nuclear_composer
    volumes:
      # Mapăm folderul curent în interiorul containerului la /app
      - .:/app
    # Când containerul pornește, va rula automat "composer install"
    command: install

  simulator:
    image: python:3.11-slim
    container_name: nuclear_simulator
    profiles:
      - manual
    volumes:
      - ./scripts:/app
    working_dir: /app
    
    command: sh -c "pip install requests python-dotenv && python -u simulator.py"
    depends_on:
      - web
    env_file:
      - .env