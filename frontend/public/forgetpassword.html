<!DOCTYPE html>
<html lang="ro">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Recuperare parolă — NuclearWatch</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="auth-wrap">
	<div class="auth-card">
		<div class="auth-title">Recuperare parolă</div>
		<div class="auth-sub">Introdu emailul pentru a primi un cod de resetare.</div>

		<form id="step1" method="post" action="/auth/forgot">
			<div class="form-group">
				<label for="email">Email</label>
				<input id="email" name="email" type="email" required class="form-input" placeholder="ex: ion.popescu@exemplu.ro">
			</div>
			<div style="margin-top:12px">
				<button type="submit" class="btn-primary">Trimite cod</button>
			</div>
		</form>

		<div id="sentNotice" class="success" style="display:none;margin-top:12px">Cod trimis! Verifică emailul (sau spam).</div>

		<form id="step2" method="post" action="/auth/reset" style="display:none;margin-top:12px">
			<div class="form-group">
				<label for="code">Cod primit</label>
				<input id="code" name="code" type="text" required class="form-input" placeholder="Introduce codul">
			</div>
			<div class="form-group">
				<label for="new_password">Parolă nouă</label>
				<input id="new_password" name="new_password" type="password" required class="form-input" placeholder="Parola nouă">
			</div>
			<div class="form-group">
				<label for="new_password_confirm">Confirmă parola nouă</label>
				<input id="new_password_confirm" name="new_password_confirm" type="password" required class="form-input" placeholder="Repetă parola nouă">
			</div>
			<div id="resetError" class="error" style="display:none"></div>
			<div style="margin-top:12px">
				<button type="submit" class="btn-primary">Setează parola</button>
			</div>
		</form>

		<div style="margin-top:12px;font-size:13px;color:var(--text-3)">Ai cont? <a href="login.html" style="color:var(--accent);">Conectează-te</a></div>
	</div>
</div>

<script>
	// Pasul 1: trimite email; pentru UI simulăm răspunsul serverului și afișăm pasul 2
	document.getElementById('step1').addEventListener('submit', function(e){
		e.preventDefault();
		var email = document.getElementById('email').value;
		if(!email){ return; }
		// Trimite cerere către server (comentat - lasăm formularul să trimită raw dacă doriți)
		// fetch('/auth/forgot',{method:'POST',body:new FormData(this)}).then(...)

		// Simulare UI: arată mesaj și pasul 2
		document.getElementById('sentNotice').style.display='block';
		document.getElementById('step2').style.display='block';
	});

	document.getElementById('step2').addEventListener('submit', function(e){
		var p = document.getElementById('new_password').value;
		var pc = document.getElementById('new_password_confirm').value;
		var err = document.getElementById('resetError');
		if(p.length < 6){ e.preventDefault(); err.style.display='block'; err.textContent='Parola trebuie să aibă cel puțin 6 caractere.'; return; }
		if(p !== pc){ e.preventDefault(); err.style.display='block'; err.textContent='Parolele nu coincid.'; return; }
		// Formularul se va trimite ca raw POST către server
	});
</script>

</body>
</html>
