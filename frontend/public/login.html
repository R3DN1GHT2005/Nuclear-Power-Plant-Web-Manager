<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Autentificare — NuclearWatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-title">Bine ai venit</div>
        <div class="auth-sub">Conectează-te la NuclearWatch</div>

        <form id="loginForm" method="post" action="/auth/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required class="form-input" placeholder="ex: ion.popescu@exemplu.ro">
            </div>
            <div class="form-group">
                <label for="password">Parolă</label>
                <input id="password" name="password" type="password" required class="form-input" placeholder="Parola ta">
            </div>
            <div style="margin:12px 0">
                <button type="submit" class="btn-primary">Conectare</button>
            </div>
        </form>

    </div>
</div>

<script src="assets/js/login.js"></script>
</body>
</html>
