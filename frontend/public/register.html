<!DOCTYPE html>
<html lang="ro">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Înregistrare — NuclearWatch</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="auth-wrap">
	<div class="auth-card">
		<div class="auth-title">Creează cont</div>
		<div class="auth-sub">Completează datele. Rolul va fi asignat ulterior de administrator.</div>

		<form id="registerForm" method="post" action="/auth/register">
			<div class="form-group">
				<label for="email">Email</label>
				<input id="email" name="email" type="email" required class="form-input" placeholder="ex: ion.popescu@exemplu.ro">
			</div>
			<div class="form-group">
				<label for="first_name">Prenume</label>
				<input id="first_name" name="first_name" type="text" required class="form-input" placeholder="Prenumele tău">
			</div>
			<div class="form-group">
				<label for="last_name">Nume</label>
				<input id="last_name" name="last_name" type="text" required class="form-input" placeholder="Numele de familie">
			</div>

			<div class="form-group">
				<label for="password">Parolă</label>
				<input id="password" name="password" type="password" required class="form-input" placeholder="Parola">
			</div>
			<div class="form-group">
				<label for="password_confirm">Confirmă parola</label>
				<input id="password_confirm" name="password_confirm" type="password" required class="form-input" placeholder="Repetă parola">
			</div>

			<div id="regError" class="error" style="display:none"></div>

			<div style="margin-top:12px">
				<button type="submit" class="btn-primary">Înregistrare</button>
			</div>
		</form>

		<div style="margin-top:12px;font-size:13px;color:var(--text-3)">Ai deja cont? <a href="login.html" style="color:var(--accent);">Conectează-te</a></div>
	</div>
</div>

<script>
	document.getElementById('registerForm').addEventListener('submit', function(e){
		var p = document.getElementById('password').value;
		var pc = document.getElementById('password_confirm').value;
		var err = document.getElementById('regError');
		if(p.length < 6){
			e.preventDefault(); err.style.display='block'; err.textContent='Parola trebuie să aibă cel puțin 6 caractere.'; return;
		}
		if(p !== pc){
			e.preventDefault(); err.style.display='block'; err.textContent='Parolele nu coincid.'; return;
		}
		// lasă formularul să trimită datele brute către server
	});
</script>

</body>
</html>
