<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuclearWatch — Reactoare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/alerts.css">
</head>
<body>

<nav class="navbar" id="top-navbar">
    <div class="nav-left">
        <a class="logo" href="index.html">
            <div class="logo-icon">⭕</div> NuclearWatch
        </a>

    </div>
    <div class="nav-right">
        <a class="logout-btn" id="btn-logout" href="login.html">Deconectare</a>
    </div>
</nav>

<main class="main split-layout">
    <div class="col-left">
        <div class="page-header">
            <div>
                <h1 class="ph-title">Reactoare</h1>
                <p class="ph-sub">Monitorizare în timp real · actualizat acum 30 sec</p>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-tab active-tab">Toate</div>
            <div class="filter-tab tab-red">Alertă</div>
            <div class="filter-tab tab-amber">Mentenanță</div>
            <div class="filter-tab tab-green">Activ</div>
            <div class="filter-tab">Oprit</div>
            <input class="search-input" type="text" placeholder="Caută reactor...">
        </div>

        <div class="scroll-area">
            <div class="reactor-grid" id="reactor-grid-container"></div>
        </div>
    </div>

    <div class="col-right">

        <div class="panel-card">
            <div style="padding: 14px 18px 10px; display: flex; align-items: baseline; justify-content: space-between;">
                <div>
                    <div style="font-size:15px; font-weight:500; color:var(--color-text-primary);">Alerte operative</div>
                    <div style="font-size:12px; color:var(--color-text-secondary); margin-top:2px;">Notificări sistem — necesită acțiune</div>
                </div>
                <a href="alerts-history.html" style="font-size:13px; color:var(--color-text-info); text-decoration:none;">Toate →</a>
            </div>
            <div style="height:0.5px; background:var(--color-border-tertiary); margin:0 18px;"></div>
            <div id="alerts-container" style="padding: 14px 18px 16px; display:flex; flex-direction:column; gap:10px;"></div>
        </div>

    </div>
</main>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/navbar.js"></script>
<script src="/assets/js/utils/helpers.js"></script>
<script src="/assets/js/utils/status.js"></script>
<script src="/assets/js/utils/dom.js"></script>
<script src="/assets/js/features/reactors-list/reactors-list-renderer.js"></script>
<script src="/assets/js/features/reactors-list/reactors-list.js"></script>
<script src="/assets/js/alerts.js"></script>
</body>
</html>
